[project]
name = "biovision"
version = "0.1.0"
description = ""
authors = [
    {name = "Your Name",email = "you@example.com"}
]
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "opencv-python (>=4.13.0.92,<5.0.0.0)",
    "pytest (<9.0)"
